name: Deploy Cloud Functions

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install function dependencies
        run: npm install
        working-directory: functions

      - name: Write .env for functions
        run: |
          echo "NODE_ENV=production" > functions/.env
          echo "DATABASE=${{ secrets.DATABASE }}" >> functions/.env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> functions/.env
          echo "WOMPI_PUB_KEY=${{ secrets.WOMPI_PUB_KEY }}" >> functions/.env
          echo "WOMPI_PRV_KEY=${{ secrets.WOMPI_PRV_KEY }}" >> functions/.env
          echo "WOMPI_EVENTS_SECRET=${{ secrets.WOMPI_EVENTS_SECRET }}" >> functions/.env
          echo "WOMPI_INTEGRITY_KEY=${{ secrets.WOMPI_INTEGRITY_KEY }}" >> functions/.env
          echo "FRONTEND_URL=${{ secrets.FRONTEND_URL }}" >> functions/.env

      - name: Deploy Cloud Functions (2nd gen)
        run: firebase deploy --only functions --project gyms-4b30f --force --token "${{ secrets.FIREBASE_TOKEN }}"
