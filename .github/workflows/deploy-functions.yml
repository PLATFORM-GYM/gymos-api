name: Deploy Cloud Functions

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install function dependencies
        run: npm install
        working-directory: functions

      - name: Write .env for functions
        run: |
          cat <<'EOF' > functions/.env
          DATABASE=${{ secrets.DATABASE }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_AUTH_TOKEN_SECRET=${{ secrets.JWT_AUTH_TOKEN_SECRET }}
          WOMPI_PUBLIC_KEY=${{ secrets.WOMPI_PUBLIC_KEY }}
          WOMPI_PRIVATE_KEY=${{ secrets.WOMPI_PRIVATE_KEY }}
          FRONTEND_URL=${{ secrets.FRONTEND_URL }}
          NODE_ENV=production
          EOF

      - name: Deploy to Firebase Functions
        run: firebase deploy --only functions --project gyms-4b30f --token "${{ secrets.FIREBASE_TOKEN }}"
